<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  mermaid.initialize({ startOnLoad: false, theme: "default" });
  addEventListener("DOMContentLoaded", () => {
    // pandoc emits ```mermaid as <pre class="mermaid"><code>…</code></pre>;
    // flatten to plain text so mermaid can render it.
    document.querySelectorAll("pre.mermaid").forEach((p) => { p.textContent = p.textContent; });
    mermaid.run({ querySelector: "pre.mermaid" });
  });
</script>
<style>
  body { max-width: 62em; }
  pre.mermaid { background: #fff; border: 1px solid #e3e6ea; border-radius: 8px;
    padding: 1rem; text-align: center; overflow-x: auto; }
  table { display: block; overflow-x: auto; }
  @media (prefers-color-scheme: dark) {
    pre.mermaid { background: #1d2026; border-color: #2a2e36; }
  }
</style>
