# DIA-NN ProForma conversion configuration

[software]
name = "DIA-NN"

[modifications]
# UniMod mappings (lowercase keys for case-insensitive matching)
"(unimod:35)" = "Oxidation"
"(unimod:1)" = "Acetyl"
"(unimod:4)" = "Carbamidomethyl"
"(unimod:7)" = "Deamidated"
"(unimod:21)" = "Phospho"

[patterns]
# DIA-NN uses (UniMod:XX) notation in Modified.Sequence
pattern = "\\(([^()]*)\\)"
before_aa = false
isalpha = true
isupper = true
