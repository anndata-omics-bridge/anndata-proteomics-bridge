# MaxQuant ProForma conversion configuration

[software]
name = "MaxQuant"

[modifications]
# MaxQuant modification notation (lowercase keys for case-insensitive matching)
"(ox)" = "Oxidation"
"(ac)" = "Acetyl"
"(oxidation (m))" = "Oxidation"
"(acetyl (protein n-term))" = "Acetyl"
"(carbamidomethyl (c))" = "Carbamidomethyl"
"(deamidated (nq))" = "Deamidated"
"(phospho (sty))" = "Phospho"

[patterns]
# MaxQuant uses nested parentheses: X(Modification (Site))
pattern = "\\([^()]*\\)|\\([^()]*\\([^()]*\\)[^()]*\\)"
before_aa = false
isalpha = true
isupper = true
