schema_version = "0.1"
file_version = "1"
software_name = "FragPipe"
software_version = "22.1-build02"
input_shape = "wide"
quantification_level = "ion"

[axis]
obs_keys = ["sample"]
var_keys = ["proforma_sequence", "Charge"]
x_layer = "Intensity"

[columns.obs]
sample = "<sample>"

[columns.var]
Peptide_Sequence = "Peptide Sequence"
Modified_Sequence = "Modified Sequence"
Charge = "Charge"
M_Z = "M/Z"
Protein = "Protein"
Protein_ID = "Protein ID"
Gene = "Gene"
Assigned_Modifications = "Assigned Modifications"

[[layers]]
name = "Intensity"
column_pattern = "^(?P<sample>LFQ_.+) Intensity$"

[[layers]]
name = "Spectral_Count"
column_pattern = "^(?P<sample>LFQ_.+) Spectral Count$"

[[layers]]
name = "Apex_Retention_Time"
column_pattern = "^(?P<sample>LFQ_.+) Apex Retention Time$"

[[layers]]
name = "Match_Type"
column_pattern = "^(?P<sample>LFQ_.+) Match Type$"
encoding_mode = "factor"
categories = { "unmatched" = 0, "MS/MS" = 1, "MBR" = 2 }

[duplicates]
mode = "error"

[modifications]
source_column = "Modified Sequence"
parser = "token_regex"
token_pattern = "\\[([^\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "57.0215"
name = "Carbamidomethyl"
accession = "UNIMOD:4"
target = "C"
position = "Anywhere"
mass_delta = 57.02146

[[modifications.map]]
token = "15.9949"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "42.0106"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106

[[modifications.map]]
token = "-17.026548"
name = "Gln->pyro-Glu"
accession = "UNIMOD:28"
target = "Q"
position = "N-term"
mass_delta = -17.026548

[[modifications.map]]
token = "-18.010565"
name = "Glu->pyro-Glu"
accession = "UNIMOD:27"
target = "E"
position = "N-term"
mass_delta = -18.010565
