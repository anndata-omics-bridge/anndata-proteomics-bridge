schema_version = "0.1"
file_version = "1"
software_name = "FragPipe"
software_version = "22.1-build02"
input_shape = "wide"
quantification_level = "ion"

[axis]
obs_keys = ["sample"]
var_keys = ["ProForma_ion"]
x_layer = "Intensity"

[axis.duplicates]
mode = "error"

[columns.obs.select]
sample = "<sample>"

[columns.var.select]
Peptide_Sequence = "Peptide Sequence"
Modified_Sequence = "Modified Sequence"
Charge = "Charge"
M_Z = "M/Z"
Protein = "Protein"
Protein_ID = "Protein ID"
Gene = "Gene"
Assigned_Modifications = "Assigned Modifications"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["Modified_Sequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["Modified_Sequence"]
how = "stripped_sequence"

[[columns.var.compute]]
name = "ProForma_ion"
from = ["ProForma_peptidoform", "Charge"]
how = "proforma_ion"

[[layers]]
name = "Intensity"
column_pattern = "^(?P<sample>.+) Intensity$"

[[layers]]
name = "Spectral_Count"
column_pattern = "^(?P<sample>.+) Spectral Count$"

[[layers]]
name = "Apex_Retention_Time"
column_pattern = "^(?P<sample>.+) Apex Retention Time$"

[[layers]]
name = "Match_Type"
column_pattern = "^(?P<sample>.+) Match Type$"
encoding_mode = "factor"
categories = { "unmatched" = 0, "MS/MS" = 1, "MBR" = 2 }

[modifications]
source_column = "Modified Sequence"
parser = "token_regex"
token_pattern = "\\[([^\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "57.0215"
accession = "UNIMOD:4"

[[modifications.map]]
token = "15.9949"
accession = "UNIMOD:35"

[[modifications.map]]
token = "42.0106"
accession = "UNIMOD:1"

[[modifications.map]]
token = "-17.026548"
accession = "UNIMOD:28"

[[modifications.map]]
token = "-18.010565"
accession = "UNIMOD:27"
