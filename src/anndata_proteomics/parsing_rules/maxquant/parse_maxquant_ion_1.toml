schema_version = "0.1"
file_version = "1"
software_name = "MaxQuant"
software_version = "2.6.7.0"
input_shape = "long"
quantification_level = "ion"

[axis]
obs_keys = ["Raw file"]
var_keys = ["proforma_sequence", "Charge"]
x_layer = "Intensity"

[columns.obs]
Raw_File = "Raw file"
Experiment = "Experiment"
Fraction = "Fraction"

[columns.var]
Sequence = "Sequence"
Modified_Sequence = "Modified sequence"
Modifications = "Modifications"
Charge = "Charge"
Mass = "Mass"
Proteins = "Proteins"
Leading_Razor_Protein = "Leading razor protein"

[[layers]]
name = "Intensity"
source_column = "Intensity"

[[layers]]
name = "MS_MS_Count"
source_column = "MS/MS count"

[[layers]]
name = "Retention_Time"
source_column = "Retention time"

[[layers]]
name = "Score"
source_column = "Score"

[[layers]]
name = "PEP"
source_column = "PEP"

[duplicates]
mode = "error"

# Handles both the new short-token format (e.g. _(ac)PEPTM(ox)_) and the
# legacy nested format (e.g. _(Acetyl (Protein N-term))PEPTM(Oxidation (M))_)
# by allowing one level of inner parentheses inside the token.
[modifications]
source_column = "Modified sequence"
parser = "token_regex"
token_pattern = "\\(([^()]*(?:\\([^()]*\\)[^()]*)*)\\)"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "ac"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106

[[modifications.map]]
token = "ox"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "Acetyl (Protein N-term)"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106

[[modifications.map]]
token = "Oxidation (M)"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "Carbamidomethyl (C)"
name = "Carbamidomethyl"
accession = "UNIMOD:4"
target = "C"
position = "Anywhere"
mass_delta = 57.02146
