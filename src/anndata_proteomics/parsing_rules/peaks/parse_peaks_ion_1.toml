schema_version = "0.1"
file_version = "1"
software_name = "PEAKS"
software_version = "13"
input_shape = "wide"
quantification_level = "ion"

[axis]
obs_keys = ["sample"]
var_keys = ["proforma_sequence", "z"]
x_layer = "Normalized_Area"

[columns.obs]
sample = "<sample>"

[columns.var]
Peptide = "Peptide"
Charge = "z"
Mz = "m/z"
RT_Range = "RT range"
Quality = "Quality"
Significance = "Significance"
Avg_Area = "Avg. Area"
Accession = "Accession"

[[layers]]
name = "Normalized_Area"
column_pattern = "^(?P<sample>LFQ.+) Normalized Area$"

[[layers]]
name = "Sample_Mz"
column_pattern = "^(?P<sample>LFQ.+) m/z$"

[[layers]]
name = "Sample_RT_Mean"
column_pattern = "^(?P<sample>LFQ.+) RT mean$"

[[layers]]
name = "AScore"
column_pattern = "^(?P<sample>LFQ.+) AScore$"

[duplicates]
mode = "error"

[modifications]
source_column = "Peptide"
parser = "token_regex"
token_pattern = "\\(([^()]+)\\)"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "+15.99"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "+57.02"
name = "Carbamidomethyl"
accession = "UNIMOD:4"
target = "C"
position = "Anywhere"
mass_delta = 57.02146

[[modifications.map]]
token = "+42.01"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106

[[modifications.map]]
token = "+15.9949"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "+57.02146"
name = "Carbamidomethyl"
accession = "UNIMOD:4"
target = "C"
position = "Anywhere"
mass_delta = 57.02146

[[modifications.map]]
token = "+42.0106"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106
