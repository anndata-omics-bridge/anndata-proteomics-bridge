schema_version = "0.1"
file_version = "1"
software_name = "PEAKS"
software_version = "13"
input_shape = "wide"
quantification_level = "ion"

[axis]
obs_keys = ["sample"]
var_keys = ["ProForma"]
x_layer = "Normalized_Area"

[axis.duplicates]
mode = "error"

[columns.obs.select]
sample = "<sample>"

[columns.var.select]
Peptide = "Peptide"
Charge = "z"
Mz = "m/z"
RT_Range = "RT range"
Quality = "Quality"
Significance = "Significance"
Avg_Area = "Avg. Area"
Accession = "Accession"

[[columns.var.compute]]
name = "Peptidoform"
from = ["Peptide"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "Stripped_Sequence_Normalized"
from = ["Peptide"]
how = "stripped_sequence"

[[columns.var.compute]]
name = "ProForma"
from = ["Peptidoform", "Charge"]
how = "proforma_ion"

[[layers]]
name = "Normalized_Area"
column_pattern = "^(?P<sample>.+) Normalized Area$"

[[layers]]
name = "Sample_Mz"
column_pattern = "^(?P<sample>.+) m/z$"

[[layers]]
name = "Sample_RT_Mean"
column_pattern = "^(?P<sample>.+) RT mean$"

[[layers]]
name = "AScore"
column_pattern = "^(?P<sample>.+) AScore$"

[modifications]
source_column = "Peptide"
parser = "token_regex"
token_pattern = "\\(([^()]+)\\)"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "+15.99"
accession = "UNIMOD:35"

[[modifications.map]]
token = "+57.02"
accession = "UNIMOD:4"

[[modifications.map]]
token = "+42.01"
accession = "UNIMOD:1"

[[modifications.map]]
token = "+15.9949"
accession = "UNIMOD:35"

[[modifications.map]]
token = "+57.02146"
accession = "UNIMOD:4"

[[modifications.map]]
token = "+42.0106"
accession = "UNIMOD:1"
