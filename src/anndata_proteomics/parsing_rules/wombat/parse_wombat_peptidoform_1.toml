schema_version = "0.1"
file_version = "1"
software_name = "WOMBAT"
software_version = "0.9.11"
input_shape = "wide"
quantification_level = "peptidoform"

[axis]
obs_keys = ["sample"]
var_keys = ["proforma_sequence"]
x_layer = "Abundance"

[columns.obs]
sample = "<sample>"

[columns.var]
modified_peptide = "modified_peptide"
protein_group = "protein_group"

[[layers]]
name = "Abundance"
column_pattern = "^abundance_(?P<sample>[AB]_[123])$"

[[layers]]
name = "Number_Of_Psms"
column_pattern = "^number_of_psms_(?P<sample>[AB]_[123])$"

[duplicates]
mode = "error"

[modifications]
source_column = "modified_peptide"
parser = "token_regex"
token_pattern = "\\[([^\\[\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "Acetyl"
name = "Acetyl"
accession = "UNIMOD:1"
target = "N-term"
position = "N-term"
mass_delta = 42.0106

[[modifications.map]]
token = "Oxidation"
name = "Oxidation"
accession = "UNIMOD:35"
target = "M"
position = "Anywhere"
mass_delta = 15.9949

[[modifications.map]]
token = "Carbamidomethyl"
name = "Carbamidomethyl"
accession = "UNIMOD:4"
target = "C"
position = "Anywhere"
mass_delta = 57.02146
