schema_version = "0.1"
file_version = "1"
software_name = "WOMBAT"
software_version = "0.9.11"
input_shape = "wide"
quantification_level = "peptidoform"

[axis]
obs_keys = ["sample"]
var_keys = ["ProForma_peptidoform"]
x_layer = "Abundance"

[axis.duplicates]
mode = "error"

[columns.obs.select]
sample = "<sample>"

[columns.var.select]
modified_peptide = "modified_peptide"
protein_group = "protein_group"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["modified_peptide"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["modified_peptide"]
how = "stripped_sequence"

[[layers]]
name = "Abundance"
column_pattern = "^abundance_(?P<sample>.+)$"

[[layers]]
name = "Number_Of_Psms"
column_pattern = "^number_of_psms_(?P<sample>.+)$"

[modifications]
source_column = "modified_peptide"
parser = "token_regex"
token_pattern = "\\[([^\\[\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "Acetyl"
accession = "UNIMOD:1"

[[modifications.map]]
token = "Oxidation"
accession = "UNIMOD:35"

[[modifications.map]]
token = "Carbamidomethyl"
accession = "UNIMOD:4"
