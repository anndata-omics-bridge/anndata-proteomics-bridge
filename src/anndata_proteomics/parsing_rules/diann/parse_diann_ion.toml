# DIA-NN ion level. Inherits shared blocks (software_name, input_shape, axis.obs_keys,
# axis.duplicates, columns.obs.select, [modifications]) from ../diann.toml.
file_version = "1"
software_version = "^[12]\\..*"
quantification_level = "ion"

[axis]
var_keys = ["ProForma_ion"]
x_layer = "Precursor_Normalised"

[columns.var.select]
Modified_Sequence = "Modified.Sequence"
Stripped_Sequence = "Stripped.Sequence"
Precursor_Charge = "Precursor.Charge"
Precursor_Id = "Precursor.Id"
Protein_Group = "Protein.Group"
Protein_Ids = "Protein.Ids"
Protein_Names = "Protein.Names"
Genes = "Genes"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["Modified_Sequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["Modified_Sequence"]
how = "stripped_sequence"

[[columns.var.compute]]
name = "ProForma_ion"
from = ["ProForma_peptidoform", "Precursor_Charge"]
how = "proforma_ion"

[[layers]]
name = "Precursor_Normalised"
source = "Precursor.Normalised"

[[layers]]
name = "Precursor_Quantity"
source = "Precursor.Quantity"

[[layers]]
name = "Ms1_Area"
source = "Ms1.Area"

[[layers]]
name = "Q_Value"
source = "Q.Value"

[[layers]]
name = "RT"
source = "RT"
