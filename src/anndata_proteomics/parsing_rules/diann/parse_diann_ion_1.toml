schema_version = "0.1"
file_version = "1"
software_name = "DIA-NN"
software_version = "2.3.0"
input_shape = "long"
quantification_level = "ion"

[axis]
obs_keys = ["Run"]
var_keys = ["proforma_sequence", "Precursor.Charge"]
x_layer = "Precursor_Normalised"

[columns.obs]
Run = "Run"

[columns.var]
Modified_Sequence = "Modified.Sequence"
Stripped_Sequence = "Stripped.Sequence"
Precursor_Charge = "Precursor.Charge"
Precursor_Id = "Precursor.Id"
Protein_Group = "Protein.Group"
Protein_Ids = "Protein.Ids"
Protein_Names = "Protein.Names"
Genes = "Genes"

[[layers]]
name = "Precursor_Normalised"
source_column = "Precursor.Normalised"

[[layers]]
name = "Precursor_Quantity"
source_column = "Precursor.Quantity"

[[layers]]
name = "Ms1_Area"
source_column = "Ms1.Area"

[[layers]]
name = "Q_Value"
source_column = "Q.Value"

[[layers]]
name = "RT"
source_column = "RT"

[duplicates]
mode = "error"

[modifications]
source_column = "Modified.Sequence"
parser = "token_regex"
token_pattern = "\\(([^()]*)\\)"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "UniMod:1"
accession = "UNIMOD:1"

[[modifications.map]]
token = "UniMod:4"
accession = "UNIMOD:4"

[[modifications.map]]
token = "UniMod:35"
accession = "UNIMOD:35"
