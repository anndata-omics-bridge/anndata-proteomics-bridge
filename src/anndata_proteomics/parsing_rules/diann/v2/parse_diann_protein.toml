# DIA-NN protein level (v2 = DIA-NN 2.x). Inherits shared blocks (software_name, input_shape,
# axis.obs_keys, columns.obs.select, [modifications]) from ../../diann.toml; overrides
# axis.duplicates to keep_first.
#
# DIA-NN 2.x dropped PG.Normalised / PG.Quantity from report.tsv; only PG.MaxLFQ (+ Genes.MaxLFQ)
# remain. Same projection as the v1 protein rule (keep_first, since PG values are pre-aggregated
# and repeated per (Run, Protein.Group)), with the leaner layers.
file_version = "2"
software_version = "^2\\..*"
quantification_level = "protein"

[axis]
var_keys = ["Protein_Group"]
x_layer = "PG_MaxLFQ"

[axis.duplicates]
mode = "keep_first"

[columns.var.select]
Protein_Group = "Protein.Group"
Protein_Ids = "Protein.Ids"
Protein_Names = "Protein.Names"
Genes = "Genes"

[[layers]]
name = "PG_MaxLFQ"
source = "PG.MaxLFQ"

[[layers]]
name = "Genes_MaxLFQ"
source = "Genes.MaxLFQ"
