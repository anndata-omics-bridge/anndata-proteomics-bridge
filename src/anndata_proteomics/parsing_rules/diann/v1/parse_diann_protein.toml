# DIA-NN protein level (v1 = DIA-NN 1.x). Inherits shared blocks (software_name, input_shape,
# axis.obs_keys, columns.obs.select, [modifications]) from ../../diann.toml; overrides
# axis.duplicates to keep_first.
#
# DIA-NN's report.tsv carries protein-group quantities (PG.*) pre-aggregated and repeated
# identically on every precursor row of a (Run, Protein.Group). So this rule reads the SAME
# report.tsv as the ion rule, projects onto the protein-group axis, and keeps the first repeated
# value (NOT sum, which would overcount).
file_version = "1"
software_version = "^1\\..*"
quantification_level = "protein"

[axis]
var_keys = ["Protein_Group"]
x_layer = "PG_MaxLFQ"

[axis.duplicates]
mode = "keep_first"

[columns.var.select]
Protein_Group = "Protein.Group"
Protein_Ids = "Protein.Ids"
Protein_Names = "Protein.Names"
Genes = "Genes"

[[layers]]
name = "PG_MaxLFQ"
source = "PG.MaxLFQ"

[[layers]]
name = "PG_Normalised"
source = "PG.Normalised"

[[layers]]
name = "PG_Quantity"
source = "PG.Quantity"

[[layers]]
name = "Genes_MaxLFQ"
source = "Genes.MaxLFQ"
