# DIA-NN fragment level (v1 = DIA-NN 1.x). Inherits shared blocks (software_name, input_shape,
# axis.obs_keys, axis.duplicates, columns.obs.select, [modifications]) from ../../diann.toml.
#
# DIA-NN 1.x exports pack per-fragment values as parallel ;-delimited lists
# (Fragment.Quant.Raw / Fragment.Correlations, present 1.7-1.9.2) but carry NO Fragment.Info, so
# fragments have no ion-type/number labels. The [fragments] block uses
# label_strategy = "positional" -> labels are frag_0, frag_1, ... explode() fans each precursor
# row into one row per fragment before pivoting.
# Feature key grammar: ProForma_fragment = "{ProForma_peptidoform}/{charge}/frag_{i}".
file_version = "1"
software_version = "^1\\..*"
quantification_level = "fragment"

[axis]
var_keys = ["ProForma_fragment"]
x_layer = "Fragment_Quant_Raw"

[columns.var.select]
Modified_Sequence = "Modified.Sequence"
Precursor_Charge = "Precursor.Charge"
Protein_Group = "Protein.Group"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["Modified_Sequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_ion"
from = ["ProForma_peptidoform", "Precursor_Charge"]
how = "proforma_ion"

[[columns.var.compute]]
name = "ProForma_fragment"
from = ["ProForma_ion", "fragment_label"]
how = "proforma_fragment"

[[layers]]
name = "Fragment_Quant_Raw"
source = "Fragment.Quant.Raw"

[[layers]]
name = "Fragment_Correlations"
source = "Fragment.Correlations"

[fragments]
label_strategy = "positional"
value_columns = ["Fragment.Quant.Raw", "Fragment.Correlations"]
delimiter = ";"
label_output = "fragment_label"
