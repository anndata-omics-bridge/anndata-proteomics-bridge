# DIA-NN vendor BASE — shared blocks inherited by every diann/ leaf rule
# (parse_diann_*.toml here and under v1/, v2/). Convention-based inheritance: this file is
# merged into each leaf at load time (rules.loader). It is NOT a rule itself (the parse_*.toml
# glob skips it) and is never converted or listed directly. Put here only what is common to
# ALL diann levels; level-specific content (axis var_keys/x_layer, layers, computes,
# version-specific var columns) lives in the leaves.
schema_version = "0.1"
software_name = "DIA-NN"
input_shape = "long"

[axis]
obs_keys = ["Run"]

[axis.duplicates]
mode = "error"

[columns.obs.select]
Run = "Run"

[modifications]
source_column = "Modified.Sequence"
parser = "token_regex"
token_pattern = "\\(([^()]*)\\)"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "UniMod:1"
accession = "UNIMOD:1"

[[modifications.map]]
token = "UniMod:4"
accession = "UNIMOD:4"

[[modifications.map]]
token = "UniMod:35"
accession = "UNIMOD:35"
