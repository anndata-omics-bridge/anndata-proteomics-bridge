schema_version = "0.1"
file_version = "1"
software_name = "Spectronaut"
software_version = "20.0.250602.92449"
input_shape = "long"
quantification_level = "ion"

[axis]
obs_keys = ["R_FileName"]
var_keys = ["ProForma_ion"]
x_layer = "FG_Quantity"

[axis.duplicates]
mode = "error"

[columns.obs.select]
R_FileName = "R.FileName"
R_Condition = "R.Condition"
R_Replicate = "R.Replicate"
R_Label = "R.Label"

[columns.var.select]
PEP_StrippedSequence = "PEP.StrippedSequence"
EG_ModifiedSequence = "EG.ModifiedSequence"
EG_ModifiedPeptide = "EG.ModifiedPeptide"
FG_Charge = "FG.Charge"
PG_ProteinGroups = "PG.ProteinGroups"
PG_ProteinAccessions = "PG.ProteinAccessions"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["EG_ModifiedSequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["EG_ModifiedSequence"]
how = "stripped_sequence"

[[columns.var.compute]]
name = "ProForma_ion"
from = ["ProForma_peptidoform", "FG_Charge"]
how = "proforma_ion"

[[layers]]
name = "FG_Quantity"
source_column = "FG.Quantity"

[[layers]]
name = "FG_Mass"
source_column = "FG.Mass"

[[layers]]
name = "FG_Qvalue"
source_column = "FG.Qvalue"

[[layers]]
name = "EG_ApexRT"
source_column = "EG.ApexRT"

[[layers]]
name = "EG_Qvalue"
source_column = "EG.Qvalue"

[modifications]
source_column = "EG.ModifiedSequence"
parser = "token_regex"
token_pattern = "\\[([^\\[\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "Acetyl (Protein N-term)"
accession = "UNIMOD:1"

[[modifications.map]]
token = "Oxidation (M)"
accession = "UNIMOD:35"

[[modifications.map]]
token = "Carbamidomethyl (C)"
accession = "UNIMOD:4"
