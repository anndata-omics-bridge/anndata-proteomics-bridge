schema_version = "0.1"
file_version = "1"
software_name = "Spectronaut"
software_version = "^(19|20)\\..*"
input_shape = "long"
quantification_level = "ion"

[axis]
obs_keys = ["R_FileName"]
var_keys = ["ProForma_ion"]
x_layer = "FG_Quantity"

[axis.duplicates]
mode = "error"

[columns.obs.select]
E_Errors = "E.Errors"
E_LFQMethod = "E.LFQMethod"
E_Warnings = "E.Warnings"
R_FileName = "R.FileName"
R_Condition = "R.Condition"
R_Fraction = "R.Fraction"
R_Replicate = "R.Replicate"
R_Label = "R.Label"

[columns.var.select]
PG_GroupLabel = "PG.GroupLabel"
PG_ProteinAccessions = "PG.ProteinAccessions"
PG_ProteinGroups = "PG.ProteinGroups"
PEP_GroupingKey = "PEP.GroupingKey"
PEP_GroupingKeyType = "PEP.GroupingKeyType"
PEP_StrippedSequence = "PEP.StrippedSequence"
EG_ModifiedSequence = "EG.ModifiedSequence"
EG_ModifiedPeptide = "EG.ModifiedPeptide"
EG_IntPIMID = "EG.IntPIMID"
EG_UserGroup = "EG.UserGroup"
EG_Workflow = "EG.Workflow"
# feature-invariant attributes: constant per ion across runs (predicted/library, profile q-values,
# decoy flag) — see apb-toml-level-design; these are .var, not per-sample layers
EG_IsDecoy = "EG.IsDecoy"
EG_iRTPredicted = "EG.iRTPredicted"
EG_AvgProfileQvalue = "EG.AvgProfileQvalue"
EG_MaxProfileQvalue = "EG.MaxProfileQvalue"
EG_MinProfileQvalue = "EG.MinProfileQvalue"
EG_PercentileQvalue = "EG.PercentileQvalue"
FG_Charge = "FG.Charge"
FG_IntMID = "FG.IntMID"
FG_LabeledSequence = "FG.LabeledSequence"
# feature-invariant: theoretical mass/m/z (from sequence + charge) and per-precursor XIC-DB id
FG_Mass = "FG.Mass"
FG_PrecMz = "FG.PrecMz"
FG_XICDBID = "FG.XICDBID"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["EG_ModifiedSequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["EG_ModifiedSequence"]
how = "stripped_sequence"

[[columns.var.compute]]
name = "ProForma_ion"
from = ["ProForma_peptidoform", "FG_Charge"]
how = "proforma_ion"

[[layers]]
name = "FG_Quantity"
source = "FG.Quantity"

[[layers]]
name = "EG_MaxChannelQvalue"
source = "EG.MaxChannelQvalue"

[[layers]]
name = "EG_MinChannelQvalue"
source = "EG.MinChannelQvalue"

[[layers]]
name = "EG_PEP"
source = "EG.PEP"

[[layers]]
name = "EG_Qvalue"
source = "EG.Qvalue"

[[layers]]
name = "EG_IsUserPeak"
source = "EG.IsUserPeak"

[[layers]]
name = "FG_PrecMzCalibrated"
source = "FG.PrecMzCalibrated"

[[layers]]
name = "FG_CScore"
source = "FG.CScore"

[[layers]]
name = "FG_Qvalue"
source = "FG.Qvalue"

[[layers]]
name = "EG_ApexRT"
source = "EG.ApexRT"

[[layers]]
name = "EG_iRTEmpirical"
source = "EG.iRTEmpirical"

[[layers]]
name = "EG_RTPredicted"
source = "EG.RTPredicted"

[[layers]]
name = "EG_IsImputed"
source = "EG.IsImputed"

[[layers]]
name = "EG_ReferenceQuantity_Settings"
source = "EG.ReferenceQuantity (Settings)"

[[layers]]
name = "EG_TargetQuantity_Settings"
source = "EG.TargetQuantity (Settings)"

[[layers]]
name = "EG_TotalQuantity_Settings"
source = "EG.TotalQuantity (Settings)"

[[layers]]
name = "EG_UsedForPeptideQuantity"
source = "EG.UsedForPeptideQuantity"

[[layers]]
name = "EG_UsedForProteinGroupQuantity"
source = "EG.UsedForProteinGroupQuantity"

[[layers]]
name = "EG_Cscore"
source = "EG.Cscore"

[[layers]]
name = "EG_NormalizedCscore"
source = "EG.NormalizedCscore"

[modifications]
source_column = "EG.ModifiedSequence"
parser = "token_regex"
token_pattern = "\\[([^\\[\\]]+)\\]"
token_position = "after_residue"
case_sensitive = false
unknown_policy = "preserve"
output_column = "proforma_sequence"

[[modifications.map]]
token = "Acetyl (Protein N-term)"
accession = "UNIMOD:1"

[[modifications.map]]
token = "Oxidation (M)"
accession = "UNIMOD:35"

[[modifications.map]]
token = "Carbamidomethyl (C)"
accession = "UNIMOD:4"
