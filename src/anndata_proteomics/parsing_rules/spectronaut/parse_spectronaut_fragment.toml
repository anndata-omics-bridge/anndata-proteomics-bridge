# Spectronaut fragment level. Inherits shared blocks (schema_version, file_version, software_name,
# software_version, input_shape, axis.obs_keys, axis.duplicates, [modifications]) from
# ../spectronaut.toml.
#
# Native Spectronaut fragment reports are already one row per observed fragment/run and carry
# F.* fragment columns. Do not use a [fragments] packed-list block here; that block is for
# DIA-NN-style precursor rows that need to be exploded.
quantification_level = "fragment"

[axis]
var_keys = [
  "EG_PrecursorId",
  "F_FrgIon",
  "F_Charge",
  "F_FrgLossType",
  "F_FrgType",
  "F_FrgNum",
]
x_layer = "F_PeakArea"

[columns.obs.select]
R_FileName = "R.FileName"
R_Condition = "R.Condition"

[columns.var.select]
PG_ProteinGroups = "PG.ProteinGroups"
PG_ProteinAccessions = "PG.ProteinAccessions"
PEP_StrippedSequence = "PEP.StrippedSequence"
EG_ModifiedSequence = "EG.ModifiedSequence"
EG_PrecursorId = "EG.PrecursorId"
FG_Charge = "FG.Charge"
F_FrgIon = "F.FrgIon"
F_Charge = "F.Charge"
F_FrgLossType = "F.FrgLossType"
F_FrgType = "F.FrgType"
F_FrgNum = "F.FrgNum"
F_FrgMz = "F.FrgMz"
F_TheoreticalMz = "F.TheoreticalMz"

[[columns.var.compute]]
name = "ProForma_peptidoform"
from = ["EG_ModifiedSequence"]
how = "proforma_sequence"

[[columns.var.compute]]
name = "ProForma_peptide"
from = ["EG_ModifiedSequence"]
how = "stripped_sequence"

[[layers]]
name = "F_PeakArea"
source = "F.PeakArea"

[[layers]]
name = "F_FrgMz"
source = "F.FrgMz"

[[layers]]
name = "F_TheoreticalMz"
source = "F.TheoreticalMz"
