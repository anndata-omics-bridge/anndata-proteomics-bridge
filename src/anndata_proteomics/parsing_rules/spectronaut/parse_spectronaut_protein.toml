# Spectronaut protein level. Inherits shared blocks (schema_version, file_version, software_name,
# software_version, input_shape, axis.obs_keys, [modifications]) from ../spectronaut.toml;
# overrides axis.duplicates to keep_first.
#
# Spectronaut reports PG.* protein-group quantities and scores on the same export rows as
# FG.* ion/precursor quantities. They are pre-aggregated per (R_FileName, PG_ProteinGroups), so
# keep the first repeated value instead of summing over precursor rows.
quantification_level = "protein"

[axis]
var_keys = ["PG_ProteinGroups"]
x_layer = "PG_Quantity"

[axis.duplicates]
mode = "keep_first"

[columns.obs.select]
E_Errors = "E.Errors"
E_LFQMethod = "E.LFQMethod"
E_Warnings = "E.Warnings"
R_FileName = "R.FileName"
R_Condition = "R.Condition"
R_Fraction = "R.Fraction"
R_Replicate = "R.Replicate"
R_Label = "R.Label"

[columns.var.select]
PG_GroupLabel = "PG.GroupLabel"
PG_ProteinAccessions = "PG.ProteinAccessions"
PG_ProteinGroups = "PG.ProteinGroups"
# Experiment-wide protein-group scores: Spectronaut computes these once per protein group and
# repeats them on every run's row, so they are feature-invariant .var attributes — see
# apb-toml-level-design. Their per-run counterparts are the "(Run-Wise)" layers below.
PG_Cscore = "PG.Cscore"
PG_PEP = "PG.PEP"
PG_Pvalue = "PG.Pvalue"
PG_Qvalue = "PG.Qvalue"

[[layers]]
name = "PG_Quantity"
source = "PG.Quantity"

[[layers]]
name = "PG_Cscore_Run_Wise"
source = "PG.Cscore (Run-Wise)"

[[layers]]
name = "PG_PEP_Run_Wise"
source = "PG.PEP (Run-Wise)"

[[layers]]
name = "PG_PValue_Run_Wise"
source = "PG.PValue (Run-Wise)"

[[layers]]
name = "PG_QValue_Run_Wise"
source = "PG.QValue (Run-Wise)"

[[layers]]
name = "PG_RunEvidenceCount"
source = "PG.RunEvidenceCount"
