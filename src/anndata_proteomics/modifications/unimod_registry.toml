# Canonical modification records, keyed by accession. Per-tool parsing-rule
# TOMLs reference modifications by accession only — name/target/position/
# mass_delta are filled from this registry at rule-load time. Update this
# file (not the per-tool TOMLs) when a new modification needs to be supported.
#
# `target` is the list of residues (or termini) the modification may sit on;
# the runtime matcher accepts a token when the adjacent residue is in this list.

