[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "diann-converter"
version = "0.1.0"
description = "Convert DIANN proteomics output to AnnData format"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Witold Wolski", email = "wew@fgcz.ethz.ch"}
]
keywords = ["proteomics", "diann", "anndata", "mass-spectrometry"]

dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "anndata>=0.10.0",
    "pyarrow>=10.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
]

[project.scripts]
diann2anndata = "diann_converter.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
